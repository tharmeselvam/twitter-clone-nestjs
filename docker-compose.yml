services:
  app:
    build: .
    container_name: twitter-clone-nestjs-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    container_name: twitter-clone-nestjs-db
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - docker.env
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: twitter-clone-nestjs-redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  db_data:
