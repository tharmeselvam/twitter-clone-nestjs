services:
  postgres:
    image: postgres:15
    container_name: twitter-clone-nestjs-db
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - docker.env
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: twitter-clone-nestjs-redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  db_data:
