services:
  mysql:
    image: mysql:8.0
    container_name: twitter-clone-nestjs-mysql
    restart: always
    ports:
      - '3306:3306'
    env_file:
      - docker.env
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: twitter-clone-nestjs-redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  db_data:
